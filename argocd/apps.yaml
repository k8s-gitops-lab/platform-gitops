platform:
  domain: 192.168.33.100.nip.io
  repoURL: https://github.com/k8s-gitops-lab/platform-gitops
  targetRevision: main
  registry:
    host: ghcr.io/k8s-gitops-lab

gitlab:
  # Constante de plateforme (même instance GitLab pour toutes les apps/services) --
  # un seul endroit, plutôt qu'un champ dupliqué par app comme avant.
  # gitlab.com (bascule big bang du 2026-07-10, cf. cockpit/docs/backlog.md) :
  # argocdRepoURL se derive par convention en {baseUrl}/{rootGroup}/{projectPath}.git.
  baseUrl: https://gitlab.com
  rootGroup: k8s-gitops-lab

appsDir: apps
