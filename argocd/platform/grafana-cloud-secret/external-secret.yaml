# Distribue le secret source argocd/grafana-cloud-credentials (depose par
# Flux depuis flux-secrets/, chiffre SOPS) vers le namespace monitoring, sous
# le nom attendu par le chart grafana/k8s-monitoring (auth.passwordKey: token,
# cf. argocd/platform/grafana-k8s-monitoring/values-local.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-cloud-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: argocd-secrets
  target:
    name: grafana-cloud-credentials
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: grafana-cloud-credentials
        property: token
