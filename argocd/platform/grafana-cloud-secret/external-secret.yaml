# Distribue le secret source argocd/grafana-cloud-credentials (depose par
# Flux depuis flux-secrets/, chiffre SOPS) vers le namespace monitoring, sous
# les cles attendues par le chart grafana/k8s-monitoring (auth.passwordKey/
# usernameKey, cf. argocd/platform/grafana-k8s-monitoring/values-local.yaml).
# Les 3 usernames (instance ID Grafana Cloud, un par service) ne sont pas
# sensibles : poses en clair via le template plutot que dans le secret
# source SOPS. Seul le token (password Basic Auth partage) est chiffre.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-cloud-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: argocd-secrets
  target:
    name: grafana-cloud-credentials
    creationPolicy: Owner
    template:
      data:
        prom-username: "3361944"
        loki-username: "1676647"
        tempo-username: "1670948"
        token: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: grafana-cloud-credentials
        property: token
