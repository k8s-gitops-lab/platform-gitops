apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: gitlab-iac-com
  namespace: flux-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  interval: 1h
  # State pre-importe (secret tfstate-default-gitlab-projects-iac-com,
  # seede a la main depuis l'apply local du module terraform-gitlabcom/)
  # puis premier plan verifie "sans changement" en mode manuel avant de
  # passer en auto (2026-07-10) -- cf. cockpit/docs/backlog.md, section
  # migration GitLab -> gitlab.com, Phase 2.
  approvePlan: "auto"
  destroyResourcesOnDeletion: false
  path: ./terraform-gitlabcom
  sourceRef:
    kind: GitRepository
    name: gitlab-projects-iac
    namespace: flux-system
  varsFrom:
    - kind: Secret
      name: gitlabcom-credentials
      varsKeys:
        - gitlab_token
    - kind: Secret
      name: github-credentials
      varsKeys:
        - github_token
  # Backend Kubernetes (pas gitlab.com) : un backend HTTP gitlab.com aurait
  # une dependance circulaire avec le script de reset complet gitlab.com
  # avant chaque bootstrap (cf. cockpit/docs/backlog.md, decision du
  # 2026-07-10) -- le state vivrait dans le projet platform-gitops,
  # lui-meme supprime par le reset, donc plus aucun endroit pour stocker
  # le state du tout premier apply qui recree ce projet. Essaye brievement
  # en backend HTTP gitlab.com (meme jour), revert ici.
  backendConfig:
    secretSuffix: gitlab-projects-iac-com
    inClusterConfig: true
  runnerPodTemplate:
    spec:
      env:
        - name: SSL_CERT_FILE
          value: /etc/ssl/extra/zscaler-root-ca.pem
      volumeMounts:
        - name: zscaler-ca
          mountPath: /etc/ssl/extra
          readOnly: true
      volumes:
        - name: zscaler-ca
          configMap:
            name: zscaler-ca
