apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: gitlab-iac-com
  namespace: flux-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  interval: 1h
  # State pre-importe (secret tfstate-default-gitlab-projects-iac-com,
  # seede a la main depuis l'apply local du module terraform-gitlabcom/)
  # puis premier plan verifie "sans changement" en mode manuel avant de
  # passer en auto (2026-07-10) -- cf. cockpit/docs/backlog.md, section
  # migration GitLab -> gitlab.com, Phase 2.
  approvePlan: "auto"
  destroyResourcesOnDeletion: false
  path: ./terraform-gitlabcom
  sourceRef:
    kind: GitRepository
    name: gitlab-projects-iac
    namespace: flux-system
  varsFrom:
    - kind: Secret
      name: gitlabcom-credentials
      varsKeys:
        - gitlab_token
    - kind: Secret
      name: github-credentials
      varsKeys:
        - github_token
  # State gitlab.com-managed plutot que backend Kubernetes (demande le
  # 2026-07-10, cf. cockpit/docs/backlog.md) : projet infra/platform-gitops
  # (id 84305765), nom d'etat gitlab-projects-iac-com. Contenu de
  # tfstate-default-gitlab-projects-iac-com migre manuellement avant ce
  # commit (meme serial/lineage verifies apres migration, aucun plan de
  # recreation). username/password (PAT, scope api) injectes via
  # backendConfigsFrom -- jamais en clair ici.
  backendConfig:
    customConfiguration: |
      backend "http" {
        address        = "https://gitlab.com/api/v4/projects/84305765/terraform/state/gitlab-projects-iac-com"
        lock_address   = "https://gitlab.com/api/v4/projects/84305765/terraform/state/gitlab-projects-iac-com/lock"
        unlock_address = "https://gitlab.com/api/v4/projects/84305765/terraform/state/gitlab-projects-iac-com/lock"
        lock_method    = "POST"
        unlock_method  = "DELETE"
        retry_wait_min = 5
      }
  backendConfigsFrom:
    - kind: Secret
      name: gitlabcom-credentials
      keys:
        - username
        - password
  runnerPodTemplate:
    spec:
      env:
        - name: SSL_CERT_FILE
          value: /etc/ssl/extra/zscaler-root-ca.pem
      volumeMounts:
        - name: zscaler-ca
          mountPath: /etc/ssl/extra
          readOnly: true
      volumes:
        - name: zscaler-ca
          configMap:
            name: zscaler-ca
