apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-secrets
  namespace: flux-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: platform-gitops
  path: ./flux-secrets
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
