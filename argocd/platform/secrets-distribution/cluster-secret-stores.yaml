# Store "kubernetes" pointant le cluster local lui-meme : permet aux
# ExternalSecrets de lire les secrets sources deposes dans argocd (ghcr)
# sans aucun job kubectl imperatif.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: argocd-secrets
spec:
  provider:
    kubernetes:
      remoteNamespace: argocd
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: external-secrets
          key: ca.crt
      auth:
        serviceAccount:
          name: secrets-distribution
          namespace: external-secrets
---
# Store "kubernetes" pointant le namespace flux-system : permet aux
# ExternalSecrets repo-creds ArgoCD (un par app, generes par
# render-argocd-apps.py) de lire le PAT gitlab.com partage
# (flux-secrets/gitlabcom-credentials.yaml, meme secret que consomme le CR
# Terraform gitlab-iac-com via varsFrom).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gitlabcom-secrets
spec:
  provider:
    kubernetes:
      remoteNamespace: flux-system
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: external-secrets
          key: ca.crt
      auth:
        serviceAccount:
          name: secrets-distribution
          namespace: external-secrets
