# Store "kubernetes" pointant le cluster local lui-meme : permet aux
# ExternalSecrets de lire les secrets sources deposes dans argocd (ghcr)
# sans aucun job kubectl impератif. L'equivalent pour gitlab (mot de passe
# root de l'instance locale) a ete retire avec le GitLab local
# (decommissionne, bascule big bang, cf. cockpit/docs/backlog.md).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: argocd-secrets
spec:
  provider:
    kubernetes:
      remoteNamespace: argocd
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: external-secrets
          key: ca.crt
      auth:
        serviceAccount:
          name: secrets-distribution
          namespace: external-secrets
