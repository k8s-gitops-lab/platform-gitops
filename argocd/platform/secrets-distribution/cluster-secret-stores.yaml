# Stores "kubernetes" pointant le cluster local lui-meme : ils permettent aux
# ExternalSecrets de lire les secrets sources deposes dans argocd (ghcr) et
# gitlab (mot de passe root) sans aucun job kubectl impératif.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: argocd-secrets
spec:
  provider:
    kubernetes:
      remoteNamespace: argocd
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: external-secrets
          key: ca.crt
      auth:
        serviceAccount:
          name: secrets-distribution
          namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gitlab-secrets
spec:
  provider:
    kubernetes:
      remoteNamespace: gitlab
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: external-secrets
          key: ca.crt
      auth:
        serviceAccount:
          name: secrets-distribution
          namespace: external-secrets
