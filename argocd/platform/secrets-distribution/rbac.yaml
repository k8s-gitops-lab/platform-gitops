# Droits minimaux du ServiceAccount secrets-distribution :
# - lire les seuls secrets sources nommes (argocd/ghcr-pull-secret,
#   gitlab/gitlab-gitlab-initial-root-password) ;
# - create selfsubjectrulesreviews, requis par la validation du provider
#   kubernetes d'External Secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secrets-distribution-store-validate
rules:
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secrets-distribution-store-validate
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secrets-distribution-store-validate
subjects:
  - kind: ServiceAccount
    name: secrets-distribution
    namespace: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secrets-distribution-read
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ghcr-pull-secret"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secrets-distribution-read
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secrets-distribution-read
subjects:
  - kind: ServiceAccount
    name: secrets-distribution
    namespace: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secrets-distribution-read
  namespace: gitlab
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["gitlab-gitlab-initial-root-password"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secrets-distribution-read
  namespace: gitlab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secrets-distribution-read
subjects:
  - kind: ServiceAccount
    name: secrets-distribution
    namespace: external-secrets
