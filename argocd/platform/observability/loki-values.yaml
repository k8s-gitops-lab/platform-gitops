deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      memory: 100Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m
  persistence:
    enabled: true
    storageClass: local-path
    size: 5Gi

# Désactive les composants du mode distribué
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Désactive le gateway NGINX (inutile en single-binary)
gateway:
  enabled: false
