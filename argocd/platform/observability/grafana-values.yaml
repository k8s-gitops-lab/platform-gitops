# POC : mot de passe en clair. À remplacer par un Secret K8s en production.
adminPassword: admin

resources:
  requests:
    memory: 100Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 200m

persistence:
  enabled: true
  storageClassName: local-path
  size: 1Gi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        url: http://vm-victoria-metrics-single-server.observability.svc:8428
        isDefault: true
        jsonData:
          timeInterval: "30s"
      - name: Loki
        type: loki
        url: http://loki.observability.svc:3100

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: POC
        type: file
        disableDeletion: false
        options:
          path: /var/lib/grafana/dashboards/default

# Dashboards importés depuis grafana.com
dashboards:
  default:
    kubernetes-cluster:
      gnetId: 7249
      revision: 1
      datasource: VictoriaMetrics
    argocd:
      gnetId: 14584
      revision: 1
      datasource: VictoriaMetrics
