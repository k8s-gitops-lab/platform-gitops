alloy:
  configMap:
    content: |
      // ── Métriques Kubernetes (pods annotés prometheus.io/scrape=true) ────────
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          action        = "keep"
          regex         = "true"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          target_label  = "__metrics_path__"
          regex         = "(.+)"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_port",
                           "__meta_kubernetes_pod_ip"]
          separator    = ";"
          regex        = "(\\d+);(.*)"
          target_label = "__address__"
          replacement  = "$2:$1"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "pods" {
        targets         = discovery.relabel.pods.output
        forward_to      = [prometheus.remote_write.vm.receiver]
        scrape_interval = "30s"
      }

      // ── kube-state-metrics ─────────────────────────────────────────────────
      prometheus.scrape "kube_state_metrics" {
        targets = [{
          __address__ = "kube-state-metrics.observability.svc:8080",
        }]
        forward_to      = [prometheus.remote_write.vm.receiver]
        scrape_interval = "30s"
      }

      // ── ArgoCD ─────────────────────────────────────────────────────────────
      prometheus.scrape "argocd" {
        targets = [
          {__address__ = "argocd-metrics.argocd.svc:8082"},
          {__address__ = "argocd-server-metrics.argocd.svc:8083"},
          {__address__ = "argocd-repo-server.argocd.svc:8084"},
        ]
        forward_to      = [prometheus.remote_write.vm.receiver]
        scrape_interval = "30s"
      }

      // ── Remote write → VictoriaMetrics ─────────────────────────────────────
      prometheus.remote_write "vm" {
        endpoint {
          url = "http://vm-victoria-metrics-single-server.observability.svc:8428/api/v1/write"
        }
      }

      // ── Logs → Loki ────────────────────────────────────────────────────────
      discovery.kubernetes "log_pods" {
        role = "pod"
      }

      discovery.relabel "log_pods" {
        targets = discovery.kubernetes.log_pods.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace",
                           "__meta_kubernetes_pod_name"]
          separator    = "/"
          target_label = "job"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.log_pods.output
        forward_to = [loki.write.loki.receiver]
      }

      loki.write "loki" {
        endpoint {
          url = "http://loki.observability.svc:3100/loki/api/v1/push"
        }
      }

controller:
  type: daemonset

resources:
  requests:
    memory: 50Mi
    cpu: 25m
  limits:
    memory: 128Mi
    cpu: 200m
