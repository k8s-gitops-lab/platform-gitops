apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: app-envs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '4'
spec:
  goTemplate: true
  goTemplateOptions:
  - missingkey=error
  generators:
  - matrix:
      generators:
      - git:
          repoURL: https://github.com/k8s-gitops-lab/platform-gitops
          revision: main
          files:
          - path: argocd/generated/apps/*/app-data.yaml
      - list:
          elementsYaml: '{{ .environments | toJson }}'
  template:
    metadata:
      name: '{{ .app }}-{{ .name }}'
      namespace: argocd
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{ .project }}'
      source:
        repoURL: '{{ .repoURL }}'
        targetRevision: '{{ .branch }}'
        path: '{{ .manifestsPath }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        retry:
          limit: 10
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
