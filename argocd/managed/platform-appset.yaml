apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: argocd-config
            path: argocd/platform/argocd-config
            namespace: argocd
            wave: "0"
          - name: argocd-ui
            path: argocd/platform/argocd-ui
            namespace: argocd
            wave: "0"
          - name: gitlab-routes
            path: argocd/platform/gitlab-routes
            namespace: gitlab
            wave: "1"
          - name: gitlab-minio-patch
            path: argocd/platform/gitlab-minio-patch
            namespace: gitlab
            wave: "1"
          - name: secrets-distribution
            path: argocd/platform/secrets-distribution
            namespace: external-secrets
            wave: "1"
          - name: grafana-cloud-secret
            path: argocd/platform/grafana-cloud-secret
            namespace: monitoring
            wave: "1"
  template:
    metadata:
      name: "{{ .name }}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .wave }}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        # Depot source GitOps.
        repoURL: https://github.com/k8s-gitops-lab/platform-gitops
        targetRevision: main
        path: "{{ .path }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        # Les CR ExternalSecret/ClusterSecretStore dependent des CRD posees
        # par l'Application external-secrets : on reessaie jusqu'a convergence.
        retry:
          limit: 10
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
