apiVersion: v1
kind: ServiceAccount
metadata:
  name: ghcr-pull-helloworld
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '1'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ghcr-pull-helloworld-read
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '1'
rules:
- apiGroups:
  - ''
  resources:
  - secrets
  resourceNames:
  - ghcr-pull-secret
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ghcr-pull-helloworld-read
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '1'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ghcr-pull-helloworld-read
subjects:
- kind: ServiceAccount
  name: ghcr-pull-helloworld
  namespace: argocd
---
apiVersion: v1
kind: Namespace
metadata:
  name: helloworld-dev
  annotations:
    argocd.argoproj.io/sync-wave: '0'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ghcr-pull-helloworld-dev-write
  namespace: helloworld-dev
  annotations:
    argocd.argoproj.io/sync-wave: '1'
rules:
- apiGroups:
  - ''
  resources:
  - secrets
  resourceNames:
  - ghcr-pull
  verbs:
  - get
  - patch
- apiGroups:
  - ''
  resources:
  - secrets
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ghcr-pull-helloworld-dev-write
  namespace: helloworld-dev
  annotations:
    argocd.argoproj.io/sync-wave: '1'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ghcr-pull-helloworld-dev-write
subjects:
- kind: ServiceAccount
  name: ghcr-pull-helloworld
  namespace: argocd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ghcr-pull-helloworld-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: '1'
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: ghcr-pull-helloworld
      restartPolicy: Never
      containers:
      - name: copy-secret
        image: registry.gitlab.com/gitlab-org/build/cng/kubectl:v18.11.5
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -ec
        - "for i in $(seq 1 60); do\n  if kubectl -n argocd get secret ghcr-pull-secret\
          \ >/dev/null 2>&1; then\n    break\n  fi\n  sleep 5\ndone\n\ndockerconfig=$(\n\
          \  kubectl -n argocd get secret ghcr-pull-secret \\\n    -o jsonpath='{.data.\\\
          .dockerconfigjson}' | base64 -d\n)\n\nkubectl -n helloworld-dev create secret\
          \ generic ghcr-pull \\\n  --type=kubernetes.io/dockerconfigjson \\\n  --from-literal=.dockerconfigjson=\"\
          $dockerconfig\" \\\n  --dry-run=client -o yaml \\\n  | kubectl apply -f\
          \ -\n"
---
