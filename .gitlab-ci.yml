stages:
  - validate
  - onboard

# Validation du contrat d'inventaire (argocd/apps/<app>.yaml) contre le JSON
# Schema argocd/apps.schema.json. Tourne sur la MR (feedback avant merge) et
# sur main (filet de securite) quand l'inventaire change : attrape un champ
# inconnu ou un type invalide avant que le rendu ArgoCD post-merge n'echoue.
validate-inventory:
  stage: validate
  image: python:3.12-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - argocd/apps/**/*
        - argocd/apps.schema.json
        - scripts/validate-inventory.py
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - argocd/apps/**/*
        - argocd/apps.schema.json
        - scripts/validate-inventory.py
  before_script:
    - pip install --quiet jsonschema pyyaml
  script:
    - python3 scripts/validate-inventory.py
# Les PR/MR sur platform-gitops se font directement sur ce projet GitLab (pas
# sur GitHub) : ce pipeline se déclenche nativement au merge sur main, sans
# délai de mirror. Il régénère les manifests ArgoCD (platform-bootstrap) et la
# liste des projets GitLab (toolbox), commit sur ce même projet, et pousse
# directement vers GitHub (pas de mirror push automatique gitlab.com -> GitHub,
# dette assumee cf. CLAUDE.md/cockpit/docs/backlog.md) -- ArgoCD/Flux
# surveillent le dépôt GitHub, donc cette étape est ce qui les tient a jour.
# Pousse aussi directement vers GitHub pour gitlab-projects-iac (qui n'a pas
# d'équivalent GitLab).
onboard-apps:
  stage: onboard
  image: python:3.12-slim
  rules:
    # Regenere seulement apres le merge effectif (pipeline de branche sur
    # main), jamais sur le pipeline de la MR elle-meme.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - argocd/apps/**/*
  variables:
    GIT_STRATEGY: clone
  before_script:
    - apt-get update -qq && apt-get install -y -qq git >/dev/null
    - git config --global user.name "gitops-bot"
    - git config --global user.email "gitops-bot@users.noreply.github.com"
  script:
    - git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/k8s-gitops-lab/platform-bootstrap.git" /tmp/platform-bootstrap
    - git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/k8s-gitops-lab/toolbox.git" /tmp/toolbox
    - git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/k8s-gitops-lab/gitlab-projects-iac.git" /tmp/gitlab-projects-iac
    - pip install -q -r /tmp/platform-bootstrap/requirements.txt -r /tmp/toolbox/requirements.txt
    - python3 /tmp/platform-bootstrap/scripts/render-argocd-apps.py --apps-file "${CI_PROJECT_DIR}/argocd/apps.yaml"
    - python3 /tmp/toolbox/scripts/render-gitlab-projects.py --apps-file "${CI_PROJECT_DIR}/argocd/apps.yaml" --output /tmp/gitlab-projects-iac/terraform/apps.auto.tfvars.json
    - |
      if [ -n "$(git status --porcelain -- argocd/generated argocd/managed)" ]; then
        git add argocd/generated argocd/managed
        git commit -m "chore(argocd): regenerate app manifests [bot]"
        # CI_JOB_TOKEN ne peut pas pousser sur une branche protegee (main) :
        # gitlab-projects-iac fournit GITLAB_PUSH_TOKEN (PAT proprietaire
        # gitlab.com) pour ca. Meme convention que ci-templates/scripts/deploy.py
        # (GITLAB_PUSH_SCHEME/GITLAB_PUSH_USERNAME/INTERNAL_GITLAB_HOST,
        # variables de groupe gitlab-projects-iac/terraform).
        git remote set-url origin "${GITLAB_PUSH_SCHEME}://${GITLAB_PUSH_USERNAME}:${GITLAB_PUSH_TOKEN}@${INTERNAL_GITLAB_HOST}/${CI_PROJECT_PATH}.git"
        git push origin HEAD:main
      else
        echo "Rien a regenerer cote platform-gitops."
      fi
    - |
      cd /tmp/gitlab-projects-iac
      if [ -n "$(git status --porcelain -- terraform/apps.auto.tfvars.json)" ]; then
        git add terraform/apps.auto.tfvars.json
        git commit -m "chore(terraform): sync apps from platform-gitops [bot]"
        git push "https://x-access-token:${GITHUB_TOKEN}@github.com/k8s-gitops-lab/gitlab-projects-iac.git" HEAD:main
      else
        echo "Rien a synchroniser cote gitlab-projects-iac."
      fi
